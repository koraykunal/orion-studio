events {
    worker_connections 1024;
}

http {
    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name orion-studio.net www.orion-studio.net;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://www.orion-studio.net$request_uri;
        }
    }

    # Redirect naked domain → www
    server {
        listen 443 ssl;
        server_name orion-studio.net;

        ssl_certificate /etc/letsencrypt/live/orion-studio.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/orion-studio.net/privkey.pem;

        return 301 https://www.orion-studio.net$request_uri;
    }

    # Main site
    server {
        listen 443 ssl;
        server_name www.orion-studio.net;

        ssl_certificate /etc/letsencrypt/live/orion-studio.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/orion-studio.net/privkey.pem;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Gzip
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
        gzip_min_length 1000;

        location / {
            proxy_pass http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
